server {
    listen 80;
    server_name localhost;

    # Thư mục gốc chứa các file tĩnh của React
    root /usr/share/nginx/html;
    index index.html;

    # Cấu hình reverse proxy cho các yêu cầu API
    # Mọi request tới /api/... sẽ được chuyển tiếp đến backend service
    location /api {
        # 'backend' là tên service trong file docker-compose.yml
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Xử lý routing phía client của React Router
    # Nếu không tìm thấy file, trả về index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Tăng hiệu năng bằng cách cache các tài nguyên tĩnh
    location ~* \.(?:jpg|jpeg|gif|png|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public";
    }
}